name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: ims_user
          POSTGRES_PASSWORD: ims_password
          POSTGRES_DB: ims_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: ims_user
          MONGO_INITDB_ROOT_PASSWORD: ims_password
          MONGO_INITDB_DATABASE: ims_db
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://ims_user:ims_password@localhost:5432/ims_db
          MONGO_URL: mongodb://ims_user:ims_password@localhost:27017/ims_db
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test-api-key
          APP_ENV: test
        run: pytest tests/ -v --tb=short